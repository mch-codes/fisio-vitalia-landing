<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f5f2"/>
      <stop offset="100%" stop-color="#dbe8e1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#mapBg)"/>

  <!-- calles estilizadas del barrio -->
  <g stroke="#b8d1c3" stroke-width="10" fill="none">
    <path d="M0 140 H800" />
    <path d="M0 300 H800" />
    <path d="M0 460 H800" />
    <path d="M180 0 V600" />
    <path d="M420 0 V600" />
    <path d="M640 0 V600" />
  </g>
  <g stroke="#8fb5a2" stroke-width="3" stroke-dasharray="2 10" fill="none">
    <path d="M0 220 H800" />
    <path d="M0 380 H800" />
    <path d="M300 0 V600" />
    <path d="M540 0 V600" />
  </g>

  <!-- manzanas -->
  <g fill="#e3edE7" opacity="0.5">
    <rect x="30" y="40" width="120" height="70" rx="6"/>
    <rect x="230" y="170" width="150" height="90" rx="6"/>
    <rect x="470" y="40" width="130" height="70" rx="6"/>
    <rect x="660" y="200" width="110" height="70" rx="6"/>
    <rect x="60" y="350" width="90" height="80" rx="6"/>
    <rect x="470" y="330" width="130" height="90" rx="6"/>
  </g>

  <!-- pin de ubicación -->
  <g transform="translate(420,300)">
    <path d="M0 -70 C36 -70 60 -44 60 -12 C60 34 0 82 0 82 C0 82 -60 34 -60 -12 C-60 -44 -36 -70 0 -70 Z" fill="#d15f3d"/>
    <circle cx="0" cy="-12" r="22" fill="#fdf4f1"/>
  </g>

  <text x="400" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2b4238">Chamberí, Madrid</text>
  <text x="400" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#557d6b">Calle de Santa Engracia, 45</text>
</svg>
